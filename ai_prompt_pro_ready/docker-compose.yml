
version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: prompts_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  redis:
    image: redis:7

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend
